  name: Changelog
  on:
    pull_request:
      branches: [master, staging]

  jobs:
    check:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
          with: { fetch-depth: 0 }
        - name: Require changelog entry
          run: |
            if [[ "${{ contains(github.event.pull_request.labels.*.name, 'no-changelog') }}" == "true" ]]; then
              echo "Skipped (no-changelog label set)"
              exit 0
            fi
            BASE=${{ github.event.pull_request.base.ref }}
            if git diff --name-only origin/$BASE...HEAD | grep -q '^CHANGELOG\.md$'; then
              echo "CHANGELOG.md was updated"
              exit 0
            fi
            echo "::error::No CHANGELOG.md entry. Add one under [Unreleased] or apply the 'no-changelog' label."
            exit 1
