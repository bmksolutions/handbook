name: CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  changelog:
    name: Require CHANGELOG entry
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Check
        run: |
          if [[ "${{ contains(github.event.pull_request.labels.*.name, 'no-changelog') }}" == "true" ]]; then
            echo "Skipped (no-changelog label set)"
            exit 0
          fi
          if git diff --name-only origin/main...HEAD | grep -q '^CHANGELOG\.md$'; then
            echo "CHANGELOG.md was updated"
            exit 0
          fi
          echo "::error::No CHANGELOG.md entry. Add one under [Unreleased] or apply the 'no-changelog' label."
          exit 1

  validate-workflows:
    name: Validate workflow templates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Lint workflow-templates/
        run: 'yamllint -d "{extends: relaxed, rules: {line-length: disable, truthy: disable}}" workflow-templates/'
      - name: Lint own workflows
        run: 'yamllint -d "{extends: relaxed, rules: {line-length: disable, truthy: disable}}" .github/workflows/'
